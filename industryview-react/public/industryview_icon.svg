  <rect x="246" y="72" width="20" height="63" rx="10" fill="rgba(255,255,255,0.2)"/>
  
  <!-- View eye -->
  <circle cx="256" cy="280" r="52" fill="none" stroke="#fff" stroke-width="14"/>
  <circle cx="256" cy="280" r="22" fill="#fff"/>
  
  <!-- Gradient -->
