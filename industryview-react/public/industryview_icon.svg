<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  
  <!-- Factory bars -->
  <rect x="100" y="195" width="90" height="217" rx="12" fill="rgba(255,255,255,0.2)"/>
  <rect x="211" y="135" width="90" height="277" rx="12" fill="rgba(255,255,255,0.38)"/>
  <rect x="322" y="220" width="90" height="192" rx="12" fill="rgba(255,255,255,0.14)"/>
  
  <!-- Chimneys -->
